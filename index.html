<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reporter</title>

<style>
:root{
  --bitel-yellow:#FFF200;
  --bitel-cyan:#00B8EB;
  --bitel-teal:#008D97;
  --bitel-deep:#003E4F;
  --ui-bg:#f5f8fa;
  --text:#123;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bitel-deep);
  color:var(--text);
}

.page{
  max-width:1000px;
  margin:auto;
  padding:24px;
}

.hero{
  background:linear-gradient(135deg,var(--bitel-yellow),var(--bitel-cyan));
  padding:24px;
  border-radius:24px;
  box-shadow:0 10px 25px #0005;
}

.hero h1{
  margin:0;
  color:var(--bitel-deep);
  font-size:34px;
}

.hero p{
  margin:8px 0 0;
  font-weight:bold;
}

.card{
  background:var(--ui-bg);
  margin-top:20px;
  padding:22px;
  border-radius:22px;
  box-shadow:0 10px 25px #0004;
}

.bar{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:end;
}

.field{
  flex:1;
  min-width:260px;
}

label{
  font-weight:bold;
  color:var(--bitel-deep);
}

select, input{
  width:100%;
  padding:13px;
  border-radius:14px;
  border:1px solid #ccd;
  margin-top:6px;
  font-size:15px;
  box-sizing:border-box;
}

button{
  background:var(--bitel-teal);
  color:white;
  border:none;
  padding:14px 22px;
  border-radius:14px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

button:hover{
  background:#007783;
}

.status{
  margin-top:14px;
  padding:12px;
  background:#e7f8fb;
  border-left:6px solid var(--bitel-cyan);
  border-radius:12px;
  font-weight:bold;
}

.report{
  margin-top:18px;
  white-space:pre-wrap;
  background:white;
  color:#111;
  padding:18px;
  border-radius:16px;
  line-height:1.45;
  font-family:Arial, sans-serif;
  font-size:15px;
  border:1px solid #dde7ea;
}

.copy-btn{
  margin-top:12px;
  background:#003E4F;
}
</style>
</head>

<body>
<div class="page">

  <header class="hero">
    <h1>Reporter</h1>
    <p>Consulta reportes desde n8n y muéstralos con formato listo para WhatsApp</p>
  </header>

  <section class="card">
    <div class="bar">
      <div class="field">
        <label>Seleccionar proyecto</label>
        <select id="projectSelect"></select>
      </div>

      <div class="field">
        <label>Webhook seleccionado</label>
        <input id="webhookUrl" readonly>
      </div>

      <button onclick="consultarReporte()">Consultar reporte</button>
    </div>

    <div id="status" class="status">Selecciona un proyecto y presiona consultar.</div>
  </section>

  <section class="card">
    <h2>Reporte</h2>
    <div id="report" class="report">Sin datos todavía.</div>
    <button class="copy-btn" onclick="copiarReporte()">Copiar para WhatsApp</button>
  </section>

</div>

<script>
const PROJECTS = [
  {
    name: "Packet Loss TRA",
    webhook: "https://n8n.38-250-161-19.nip.io/webhook/08f3c561-84c0-4496-aa0d-0ee6e2133576"
  },
  {
    name: "MW Congestion",
    webhook: "https://TU-N8N.com/webhook/mw-congestion"
  },
  {
    name: "Vikunja Pendientes",
    webhook: "https://TU-N8N.com/webhook/vikunja-pendientes"
  }
];

const projectSelect = document.getElementById("projectSelect");
const webhookUrl = document.getElementById("webhookUrl");
const statusBox = document.getElementById("status");
const reportBox = document.getElementById("report");

function cargarProyectos(){
  projectSelect.innerHTML = "";

  PROJECTS.forEach((p, index) => {
    const option = document.createElement("option");
    option.value = index;
    option.textContent = p.name;
    projectSelect.appendChild(option);
  });

  actualizarWebhook();
}

function actualizarWebhook(){
  const project = PROJECTS[projectSelect.value];
  webhookUrl.value = project.webhook;
}

projectSelect.addEventListener("change", actualizarWebhook);

async function consultarReporte(){
  const project = PROJECTS[projectSelect.value];

  statusBox.textContent = "Consultando reporte...";
  reportBox.textContent = "Consultando...";

  try{
    const response = await fetch(project.webhook, {
      method: "POST"
    });

    const contentType = response.headers.get("content-type") || "";
    let mensaje = "";

    if(contentType.includes("application/json")){
      const data = await response.json();

      if(Array.isArray(data)){
        mensaje = data[0]?.mensaje || data[0]?.message || JSON.stringify(data, null, 2);
      }else{
        mensaje = data.mensaje || data.message || JSON.stringify(data, null, 2);
      }

    }else{
      mensaje = await response.text();
    }

    mensaje = String(mensaje)
      .replaceAll("\\n", "\n")
      .replaceAll("\\t", "\t");

    reportBox.textContent = mensaje;
    statusBox.textContent = "Reporte recibido correctamente.";

  }catch(error){
    statusBox.textContent = "Error al consultar el webhook.";
    reportBox.textContent = "Error: " + error.message;
  }
}

async function copiarReporte(){
  const texto = reportBox.textContent;

  if(!texto || texto === "Sin datos todavía."){
    statusBox.textContent = "No hay reporte para copiar.";
    return;
  }

  try{
    await navigator.clipboard.writeText(texto);
    statusBox.textContent = "Reporte copiado. Ya puedes pegarlo en WhatsApp.";
  }catch(error){
    statusBox.textContent = "No se pudo copiar automáticamente. Selecciona el texto manualmente.";
  }
}

cargarProyectos();
</script>

</body>
</html>
